name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Token permissions for downstream steps. GitHub's default GITHUB_TOKEN is
    # read-only since 2023; these grants are needed for:
    #   - "Apply WASM label"      uses actions/github-script to add a PR label
    #                              (`issues:write` covers PR labels — labels live
    #                              on the issues endpoint).
    #   - "Post CSV diff comment" posts a sticky review comment on the PR
    #                              (`pull-requests:write`).
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so later steps that diff against origin/main work.
          # The "Detect WASM backend changes" + "Post CSV diff comment" steps
          # both run `git diff --name-only origin/main...HEAD`, which fails
          # with "ambiguous argument" on the default shallow (fetch-depth: 1)
          # checkout because origin/main is never fetched.
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high --omit=dev

      - name: Check Formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Audit protocol matrix refs
        run: npm run audit:matrix-refs

      - name: Audit timeline aliases
        run: npm run audit:timeline-aliases

      - name: Audit compliance country tokens
        run: npm run audit:compliance-countries

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Validate OSCAL output (optional)
        run: |
          if command -v oscal-cli &> /dev/null; then
            oscal-cli validate public/data/pqctoday-oscal.json --as assessment-results
          else
            echo "OSCAL CLI not present — skipping schema validation"
          fi
        continue-on-error: true

      - name: Test
        run: npm run test

      - name: Validate data integrity (DS17)
        run: DS_SEVERITY=ERROR npx tsx scripts/validate-data-integrity.ts
        continue-on-error: true

      - name: Audit workshop flows
        # Static audit: every cue in public/workshop/*.json must resolve to a
        # real route / data-workshop-target slug / fixture key / artifact slug
        # in current src/. Exits non-zero on any BLOCKER. WARN/INFO advisory.
        run: npx tsx scripts/audit-workshop-flows.ts

      - name: Extract PR labels
        if: github.event_name == 'pull_request'
        id: pr-labels
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '[.[].name] | join(",")')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT

      - name: Post CSV diff comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_LABELS: ${{ steps.pr-labels.outputs.labels }}
        run: npx tsx scripts/ci/post-csv-diff.ts
        continue-on-error: true

      - name: Detect WASM backend changes
        if: github.event_name == 'pull_request'
        id: wasm-detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          if echo "$CHANGED" | grep -qE '^(public/dist/|src/wasm/)'; then
            echo "wasm_changed=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -q 'package.json'; then
            if git diff origin/main...HEAD -- package.json | grep -qE '@oqs/liboqs-js|@pqctoday/softhsm-wasm'; then
              echo "wasm_changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Apply WASM label
        if: github.event_name == 'pull_request' && steps.wasm-detect.outputs.wasm_changed == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['tool:wasm-backend']
            })

      - name: Check tool version bumps
        if: github.event_name == 'pull_request'
        run: npx tsx scripts/ci/check-tool-version-bump.ts

      - name: Check module version bumps
        if: github.event_name == 'pull_request'
        run: npx tsx scripts/ci/check-module-version-bump.ts

      - name: Validate offline-attestation files
        # When approvals/offline-{pr}-*.json files are committed to the PR,
        # verify they (a) match the required schema, (b) name an active SME
        # from reviewers.json, and (c) carry a proxy_github_handle that is a
        # member of at least one CODEOWNERS team owning a changed file.
        # No-ops when no attestation files are present (the common case).
        # See trust-engine explainability doc §5.3.
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.OFFLINE_ATTESTATION_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx scripts/ci/validate-offline-attestation.ts

  append-revision:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.REVISION_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve merged PR number
        id: pr-info
        run: |
          PR_NUMBER=$(gh pr list --state merged --base main --json number,mergeCommit \
            --jq ".[] | select(.mergeCommit.oid == \"$GITHUB_SHA\") | .number" | head -1)
          echo "pr_number=${PR_NUMBER:-0}" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append revision entry
        if: steps.pr-info.outputs.pr_number != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.REVISION_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx scripts/ci/append-revision.ts
