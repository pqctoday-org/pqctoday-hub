name: Sign trust-engine artifacts

# Runs after trust-engine artifacts are updated on main and signs them with the
# maintainer ML-DSA-65 attestation key, committing the detached signatures back.
#
# Covered artifacts (single source of truth: scripts/attestation/artifacts.ts):
#   - public/data/revisions.jsonl                         (CI append on merge)
#   - public/data/rag-corpus.json                         (build-time regen)
#   - public/data/pqctoday-oscal.json                     (combined, from build)
#   - public/data/pqctoday-oscal-governance.json          (governance subset)
#   - public/data/pqctoday-oscal-full.json                (full inventory)
#   - public/data/pqctoday-oscal-assessment-plan.json     (assessment-plan companion)
#   - public/data/pqctoday-cbom.json                      (release tags only; optional)
#
# Required secret:
#   ATTESTATION_PRIVATE_KEY_B64 — base64 of the JSON private-key file produced by
#                                 scripts/attestation/generate-attestation-key.ts
#
# Skip mode: if the secret is unset (e.g. before the maintainer has rotated keys
# in), the workflow no-ops with a warning so it never blocks merges.

on:
  push:
    branches: [main]
    paths:
      - 'public/data/revisions.jsonl'
      - 'public/data/rag-corpus.json'
      - 'public/data/pqctoday-oscal.json'
      - 'public/data/pqctoday-oscal-governance.json'
      - 'public/data/pqctoday-oscal-full.json'
      - 'public/data/pqctoday-oscal-assessment-plan.json'
      - 'public/data/pqctoday-cbom.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # We commit back to main; need a token with write access
          token: ${{ secrets.REVISION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sign all trust-engine artifacts
        env:
          ATTESTATION_PRIVATE_KEY_B64: ${{ secrets.ATTESTATION_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$ATTESTATION_PRIVATE_KEY_B64" ]; then
            echo "::warning::ATTESTATION_PRIVATE_KEY_B64 secret not set — skipping signing"
            exit 0
          fi
          npm run trust-engine:sign

      - name: Verify all signatures
        run: |
          if [ -f public/data/revisions.jsonl.sig ]; then
            npm run trust-engine:verify
          else
            echo "No signatures produced; nothing to verify."
          fi

      - name: Commit signatures
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(trust-engine): sign trust-engine artifacts [skip ci]'
          file_pattern: 'public/data/*.sig'
