name: Sign revisions.jsonl

# Runs after revisions.jsonl is appended on merge (by ci.yml's append-revision step).
# Signs the updated file with the maintainer ML-DSA-65 attestation key and commits
# the detached signature back to main.
#
# Required secret:
#   ATTESTATION_PRIVATE_KEY_B64 — base64 of the JSON private-key file produced by
#                                 scripts/attestation/generate-attestation-key.ts
#
# Skip mode: if the secret is unset (e.g. before the maintainer has rotated keys
# in), the workflow no-ops with a warning so it never blocks merges.

on:
  push:
    branches: [main]
    paths:
      - 'public/data/revisions.jsonl'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # We commit back to main; need a token with write access
          token: ${{ secrets.REVISION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sign revisions.jsonl
        env:
          ATTESTATION_PRIVATE_KEY_B64: ${{ secrets.ATTESTATION_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$ATTESTATION_PRIVATE_KEY_B64" ]; then
            echo "::warning::ATTESTATION_PRIVATE_KEY_B64 secret not set — skipping signing"
            exit 0
          fi
          npx tsx scripts/attestation/sign-revisions.ts

      - name: Verify signature locally before commit
        run: |
          if [ -f public/data/revisions.jsonl.sig ]; then
            npx tsx scripts/attestation/verify-revisions.ts
          else
            echo "No signature produced; nothing to verify."
          fi

      - name: Commit signature
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(trust-engine): sign revisions.jsonl [skip ci]'
          file_pattern: 'public/data/revisions.jsonl.sig'
