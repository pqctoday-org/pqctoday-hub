name: Stale module-review detector

# Runs the trust-engine CM-C check on a schedule and opens (or updates)
# a tracking Issue listing every module whose content has been edited
# more than STALE_DAYS days after its declared `lastReviewed` date.
#
# CM-C is part of the regular CI suite (`scripts/validate-data-integrity.ts`)
# and runs on every PR. This workflow exists in addition because:
#   1. PRs that don't touch a module won't surface its growing staleness.
#   2. A scheduled cron makes the SLA explicit ("re-review within X days").
#   3. The Issue is a single living tracker SMEs can subscribe to.
#
# Closes FR-C-02 (variant) and §16.3 #10 (reviewer-bench growth — stale
# module visibility is the input to the recruitment ask).

on:
  schedule:
    # Mondays 06:00 UTC — same day as trusted-source-freshness so SMEs see
    # both reports in one notification window.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # CM-C needs git log history per module dir

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validator (capture CM-C output)
        id: validate
        run: |
          set +e
          npx tsx scripts/validate-data-integrity.ts > /tmp/validator.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Extract just the CM-C block — the lines from "CM-C" up to the next check
          # boundary (a line beginning with "  ✓ [" / "  ⚠ [" / "  ✗ [").
          awk '/\[CM-C\]/{inblock=1; print; next} inblock && /^\s+[✓⚠✗] \[/{inblock=0} inblock' \
            /tmp/validator.log > /tmp/cm-c.log || true
          echo "---CM-C report---"
          cat /tmp/cm-c.log
          {
            echo 'cm_c_report<<CM_C_EOF'
            cat /tmp/cm-c.log
            echo 'CM_C_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        uses: actions/github-script@v7
        env:
          CM_C_REPORT: ${{ steps.validate.outputs.cm_c_report }}
        with:
          script: |
            const title = '[trust-engine] Stale module-review tracker'
            const report = process.env.CM_C_REPORT || '(empty)'
            const body = [
              '> Auto-generated by `.github/workflows/stale-review-detector.yml`. Last refreshed: ' + new Date().toISOString(),
              '',
              'CM-C is the trust-engine validator that flags modules whose `lastReviewed` date predates the latest commit on the module directory by more than 30 days. The list below is the current snapshot — it shrinks when an SME re-reviews a module and bumps `lastReviewed`.',
              '',
              '## Current findings',
              '',
              '```',
              report.trim() || '(no findings — every module is current)',
              '```',
              '',
              '## What to do',
              '',
              '1. Pick a module from the list and re-read its content + workshop steps.',
              '2. Update `lastReviewed: \'YYYY-MM-DD\'` in `content.ts`.',
              '3. Open a PR with `change_type: content_review` so the revision lands in `revisions.jsonl` correctly.',
              '4. Close this issue when the list is empty (a fresh run will reopen it if new staleness appears).',
              '',
              'Cross-references: [FR-C-02 spec](../../pqctoday-priv/requirements/trust-engine-prd.md), [Explainability §16.3 #10](../../pqctoday-priv/docs/platform/data/trust-engine-explainability.md).',
            ].join('\n')

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'trust-engine,stale-review',
              per_page: 10,
            })
            const match = existing.find(i => i.title === title)

            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              })
              core.notice(`Updated tracking issue #${match.number}`)
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['trust-engine', 'stale-review'],
              })
              core.notice(`Opened tracking issue #${created.number}`)
            }
